<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resizes · Navegador de llamada en frío</title>
<style>
  :root {
    --ink: #11161F;
    --ink-soft: #3A4452;
    --mute: #707C8C;
    --line: #E4E7EC;
    --paper: #FBFBF9;
    --panel: #FFFFFF;
    --green: #1D9E75; --green-bg: #ECF8F3; --green-d: #0C6B4D;
    --blue: #2C7BE5; --blue-bg: #EAF2FD; --blue-d: #1A559F;
    --amber: #C77D17; --amber-bg: #FDF4E7; --amber-d: #8A5409;
    --purple: #6B4FD8; --purple-bg: #F0EDFB; --purple-d: #463399;
    --red: #D2453F; --red-bg: #FBEBEA; --red-d: #962925;
    --teal: #0E8C97; --teal-bg: #E6F5F6; --teal-d: #0A636B;
    --shadow: 0 1px 2px rgba(17,22,31,.04), 0 6px 20px rgba(17,22,31,.07);
    --shadow-lg: 0 8px 40px rgba(17,22,31,.13);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    background-image: radial-gradient(circle at 1px 1px, rgba(17,22,31,.035) 1px, transparent 0);
    background-size: 22px 22px;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 22px 18px 120px; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .brand { display: flex; align-items: baseline; gap: 9px; }
  .brand .logo { font-weight: 800; font-size: 19px; letter-spacing: -.02em; color: var(--ink); }
  .brand .logo .dot { color: var(--green); }
  .brand .tag { font-size: 11px; color: var(--mute); font-weight: 500; letter-spacing: .02em; text-transform: uppercase; }
  .reset { font-size: 12px; color: var(--mute); background: none; border: 1px solid var(--line); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all .15s; font-weight: 500; }
  .reset:hover { color: var(--ink); border-color: var(--mute); }

  /* Progress rail */
  .rail { display: flex; gap: 5px; margin: 16px 0 22px; }
  .rail .seg { flex: 1; height: 3px; border-radius: 3px; background: var(--line); transition: background .4s, transform .4s; transform-origin: left; }
  .rail .seg.done { background: var(--green); }
  .rail .seg.active { background: var(--ink); }

  /* Breadcrumb of the conversation so far */
  .trail { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .trail .crumb {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px; color: var(--ink-soft);
    animation: slideIn .35s ease both;
  }
  .trail .crumb .chip {
    flex-shrink: 0; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 8px; border-radius: 6px; margin-top: 1px;
  }
  .trail .crumb .said { color: var(--mute); }
  .trail .crumb .said b { color: var(--ink); font-weight: 600; }

  /* Main card */
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow); overflow: hidden;
    animation: pop .4s cubic-bezier(.2,.9,.3,1.2) both;
  }
  .card .top { padding: 7px 22px; display: flex; align-items: center; gap: 9px; border-bottom: 1px solid var(--line); }
  .card .top .phase-no { font-size: 11px; font-weight: 800; color: #fff; width: 20px; height: 20px; border-radius: 6px; display: grid; place-items: center; }
  .card .top .phase-name { font-size: 12px; font-weight: 600; letter-spacing: .01em; }
  .card .top .phase-meta { font-size: 11px; color: var(--mute); margin-left: auto; }

  .card .body { padding: 22px; }
  .objective { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

  /* The line to say */
  .say {
    background: var(--ink); color: #fff; border-radius: 14px; padding: 17px 19px;
    font-size: 16.5px; line-height: 1.5; font-weight: 450; position: relative;
  }
  .say::before {
    content: "DI ESTO"; position: absolute; top: -8px; left: 16px;
    background: var(--green); color: #fff; font-size: 9px; font-weight: 800; letter-spacing: .08em;
    padding: 2px 7px; border-radius: 5px;
  }
  .say b { font-weight: 700; color: #fff; }
  .say .hl { background: rgba(255,255,255,.16); padding: 0 4px; border-radius: 4px; }

  .prompt-q {
    font-size: 19px; font-weight: 600; line-height: 1.4; color: var(--ink); letter-spacing: -.01em;
  }
  .prompt-q .quote { color: var(--ink); }
  .sub { font-size: 13.5px; color: var(--mute); margin-top: 9px; }

  /* What the lead says — answer buttons */
  .listen { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--mute); margin: 20px 0 10px; display: flex; align-items: center; gap: 7px; }
  .listen::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--red); box-shadow: 0 0 0 3px var(--red-bg); animation: pulse 1.6s infinite; }
  .answers { display: flex; flex-direction: column; gap: 9px; }
  .ans {
    text-align: left; width: 100%; cursor: pointer; font-family: inherit;
    background: var(--panel); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 13px 15px; transition: all .16s; display: flex; align-items: center; gap: 12px;
  }
  .ans:hover { border-color: var(--ink); transform: translateY(-1px); box-shadow: var(--shadow); }
  .ans:active { transform: translateY(0); }
  .ans .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .ans .txt { flex: 1; }
  .ans .txt .label { font-size: 15px; font-weight: 600; color: var(--ink); }
  .ans .txt .hint { font-size: 12.5px; color: var(--mute); margin-top: 2px; }
  .ans .arrow { color: var(--mute); font-size: 17px; transition: transform .16s; }
  .ans:hover .arrow { transform: translateX(3px); color: var(--ink); }

  /* Follow-up coaching lines inside card */
  .coach { margin-top: 16px; border-radius: 12px; padding: 13px 15px; font-size: 13.5px; line-height: 1.5; }
  .coach .tit { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
  .coach ul { list-style: none; }
  .coach li { padding-left: 16px; position: relative; margin-bottom: 4px; }
  .coach li::before { content: "→"; position: absolute; left: 0; font-weight: 700; opacity: .5; }

  /* Outcome / terminal card */
  .outcome-badge { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 20px; margin-bottom: 14px; }
  .next-actions { display: flex; flex-direction: column; gap: 9px; margin-top: 8px; }

  /* Pill buttons (continue / secondary) */
  .actions { display: flex; gap: 9px; margin-top: 18px; flex-wrap: wrap; }
  .btn { font-family: inherit; font-size: 14px; font-weight: 600; padding: 11px 18px; border-radius: 10px; cursor: pointer; border: 1.5px solid var(--line); background: var(--panel); color: var(--ink); transition: all .15s; }
  .btn:hover { border-color: var(--ink); }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.primary:hover { opacity: .9; }
  .btn.ghost { border-color: transparent; color: var(--mute); }
  .btn.ghost:hover { color: var(--ink); background: var(--paper); }

  /* Objection floating button + panel */
  .obj-fab {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--red); color: #fff; border: none; font-family: inherit;
    font-size: 14px; font-weight: 700; padding: 13px 22px; border-radius: 30px;
    cursor: pointer; box-shadow: var(--shadow-lg); z-index: 40;
    display: flex; align-items: center; gap: 9px; transition: transform .15s;
  }
  .obj-fab:hover { transform: translateX(-50%) translateY(-2px); }
  .obj-fab .ico { font-size: 16px; }

  .sheet-bg { position: fixed; inset: 0; background: rgba(17,22,31,.4); z-index: 50; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .sheet-bg.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
    background: var(--panel); border-radius: 20px 20px 0 0; box-shadow: var(--shadow-lg);
    max-height: 86vh; overflow-y: auto; transform: translateY(100%); transition: transform .3s cubic-bezier(.2,.8,.3,1);
    max-width: 760px; margin: 0 auto;
  }
  .sheet.open { transform: translateY(0); }
  .sheet .grab { width: 38px; height: 4px; background: var(--line); border-radius: 4px; margin: 11px auto 4px; }
  .sheet .sheet-head { padding: 8px 22px 14px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); z-index: 2; }
  .sheet .sheet-head h2 { font-size: 17px; font-weight: 700; }
  .sheet .sheet-head p { font-size: 12.5px; color: var(--mute); margin-top: 2px; }
  .sheet .sheet-body { padding: 16px 22px 30px; }
  .obj { border: 1px solid var(--line); border-left: 4px solid var(--mute); border-radius: 12px; padding: 14px 15px; margin-bottom: 11px; }
  .obj .q { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 9px; }
  .obj .r { font-size: 14px; line-height: 1.5; color: var(--ink-soft); background: var(--paper); border-radius: 9px; padding: 11px 13px; }
  .obj .f { font-size: 12.5px; color: var(--mute); margin-top: 8px; }
  .obj .f b { color: var(--ink-soft); }
  .obj-group-tit { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--mute); margin: 14px 0 9px; }

  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.99); } to { opacity: 1; transform: none; } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px var(--red-bg); } 50% { box-shadow: 0 0 0 5px transparent; } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  @media (max-width: 520px) {
    .wrap { padding: 16px 13px 120px; }
    .say { font-size: 15.5px; }
    .prompt-q { font-size: 17px; }
    .card .top .phase-meta { display: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="logo">Resizes<span class="dot">.</span></span>
        <span class="tag">Navegador de llamada</span>
      </div>
      <button class="reset" id="resetBtn">Reiniciar</button>
    </header>

    <div class="rail" id="rail"></div>
    <div class="trail" id="trail"></div>
    <div id="stage"></div>
  </div>

  <button class="obj-fab" id="objFab"><span class="ico">⚡</span> Me ha puesto una objeción</button>

  <div class="sheet-bg" id="sheetBg"></div>
  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <div class="sheet-head">
      <h2>Manejo de objeciones</h2>
      <p>Reconoce → reencuadra hacia el coste de no actuar → devuelve una pregunta. Nunca discutas.</p>
    </div>
    <div class="sheet-body" id="objBody"></div>
  </div>

<script>
const ACCENT = {
  green:{bg:'var(--green-bg)',fg:'var(--green-d)',solid:'var(--green)'},
  blue:{bg:'var(--blue-bg)',fg:'var(--blue-d)',solid:'var(--blue)'},
  amber:{bg:'var(--amber-bg)',fg:'var(--amber-d)',solid:'var(--amber)'},
  purple:{bg:'var(--purple-bg)',fg:'var(--purple-d)',solid:'var(--purple)'},
  red:{bg:'var(--red-bg)',fg:'var(--red-d)',solid:'var(--red)'},
  teal:{bg:'var(--teal-bg)',fg:'var(--teal-d)',solid:'var(--teal)'},
  ink:{bg:'var(--paper)',fg:'var(--ink)',solid:'var(--ink)'}
};

// ---- NODE GRAPH ----
// type: 'say' (line + answers), 'ask' (question + answers), 'end' (terminal outcome)
const NODES = {
  start: {
    phase:1, phaseName:'Apertura', phaseColor:'green', phaseMeta:'Bajar defensas + permiso',
    objective:{t:'Objetivo: conseguir permiso y bajar defensas', c:'green'},
    say:'Hola {nombre}, ¿qué tal estás? Mira, soy {tú} de Resizes. Si te digo que esto es una llamada en frío… ¿<b>tirarías el móvil por la ventana</b>? ¿O me dejas <span class="hl">2 minutos</span> y, si no es relevante para ti, no te vuelvo a llamar nunca más?',
    answers:[
      {label:'Se ríe / "venga, 2 min"', hint:'Acepta escuchar', dot:'green', go:'diag', crumb:'Acepta escuchar'},
      {label:'"Ahora no puedo"', hint:'Sin tiempo ahora', dot:'amber', go:'callback', crumb:'Sin tiempo ahora'},
      {label:'"No me interesa"', hint:'Rechazo de entrada', dot:'red', go:'deflect', crumb:'"No me interesa" de entrada'}
    ]
  },
  callback: {
    phase:1, phaseName:'Apertura', phaseColor:'amber', phaseMeta:'Reagendar',
    say:'Lo entiendo, no te robo tiempo. ¿Te va mejor que te llame mañana o esta tarde? Te prometo que son 2 minutos.',
    coach:{c:'amber',tit:'Acción',items:['Propón día y hora concretos, no "ya te llamo".','Agenda el callback en el CRM y cuelga amable.']},
    end:{badge:'Callback agendado', c:'amber', actions:[{label:'Volver al inicio', go:'start'}]}
  },
  deflect: {
    phase:1, phaseName:'Apertura', phaseColor:'red', phaseMeta:'Desarmar el "no"',
    say:'Sin problema. Solo una cosa antes de colgar: ¿tu <b>equipo técnico va fluido</b>, o vive esperando que alguien le desbloquee entornos, accesos y despliegues? Si me dices que va fino, cuelgo y no molesto.',
    sub:'No discutas el "no me interesa". Una sola pregunta de dolor y dejas que decida.',
    listen:true,
    answers:[
      {label:'"Pues… ahora que lo dices, va lento"', hint:'Pica', dot:'green', go:'diag', crumb:'Reconoce que el equipo va lento'},
      {label:'"Va bien, gracias"', hint:'Cierra de verdad', dot:'red', go:'closeNice', crumb:'Cierra sin interés'}
    ]
  },
  closeNice: {
    phase:1, phaseName:'Apertura', phaseColor:'ink', phaseMeta:'Cierre limpio',
    say:'Perfecto, me alegro. Gracias por el minuto y disculpa la interrupción. Si en algún momento cambia, aquí estoy.',
    end:{badge:'Cierre limpio · puerta abierta', c:'ink', actions:[{label:'Volver al inicio', go:'start'}]}
  },

  // ---- DIAGNÓSTICO DE MOMENTO ----
  diag: {
    phase:2, phaseName:'Diagnóstico', phaseColor:'blue', phaseMeta:'¿Base o agilidad?',
    objective:{t:'Objetivo: saber qué producto encaja', c:'blue'},
    say:'Para no hacerte perder el tiempo, una pregunta rápida: ¿vuestro reto ahora está más en <b>tener la infraestructura cloud bien montada y bajo control</b>, o en que <b>el equipo técnico va frenado</b> porque todo pasa por una cola de tickets y un equipo que no da abasto?',
    listen:true,
    answers:[
      {label:'"La infraestructura / el cloud"', hint:'Necesita BASE → AWS gestionado', dot:'green', go:'aws_costes', crumb:'Su reto es la infraestructura'},
      {label:'"El equipo va frenado"', hint:'Necesita AGILIDAD → DevOps Agent', dot:'purple', go:'agent_bottleneck', crumb:'Su reto es el equipo frenado'},
      {label:'"Las dos cosas"', hint:'Escalera: base primero', dot:'blue', go:'aws_costes', crumb:'Ambas: empezamos por la base'}
    ]
  },

  // ======= RAMA A · AWS GESTIONADO =======
  aws_costes: {
    phase:2, phaseName:'Rama A · AWS', phaseColor:'green', phaseMeta:'Costes cloud',
    ask:'¿Cuándo fue la última vez que abristeis la factura de AWS y os llevasteis una sorpresa?',
    sub:'Pain point: costes cloud sin control.',
    listen:true,
    answers:[
      {label:'"Sí, nos ha pasado"', hint:'Admite el dolor', dot:'green', go:'aws_costes_pain', crumb:'Factura de AWS le ha sorprendido'},
      {label:'"Lo tenemos controlado"', hint:'Verifica', dot:'amber', go:'aws_costes_check', crumb:'Dice que controla los costes'},
      {label:'"No lo reviso yo"', hint:'Redirige', dot:'ink', go:'aws_costes_unknown', crumb:'No revisa él los costes'}
    ]
  },
  aws_costes_pain: {
    phase:2, phaseName:'Rama A · AWS', phaseColor:'green', phaseMeta:'Costes · profundiza',
    ask:'¿Qué fue lo que se había disparado? ¿Y quién lo revisa y optimiza cada mes?',
    coach:{c:'green',tit:'Lo que buscas',items:['Que admita que no hay nadie optimizando de forma sistemática.','Confirmado el dolor → pasa a validar.']},
    answers:[{label:'Dolor confirmado', hint:'Sigue al cierre', dot:'green', go:'validate', crumb:'Costes sin optimizar — dolor confirmado'}]
  },
  aws_costes_check: {
    phase:2, phaseName:'Rama A · AWS', phaseColor:'amber', phaseMeta:'Costes · verifica',
    ask:'¿Tenéis lifecycle policies y alertas de presupuesto configuradas, o lo revisáis a mano? ¿Qué % de la factura dirías que es waste?',
    coach:{c:'amber',tit:'Casi siempre aparece una grieta',items:['Si es manual: "¿cuánto tiempo os lleva al mes?"','Si no sabe el % de waste: ahí está la oportunidad.']},
    answers:[
      {label:'Aparece una grieta', hint:'Reencuadra hacia el dolor', dot:'green', go:'validate', crumb:'Grieta en el control de costes'},
      {label:'Lo tiene de verdad resuelto', hint:'Cambia de pain point', dot:'amber', go:'aws_visib', crumb:'Costes bien resueltos'}
    ]
  },
  aws_costes_unknown: {
    phase:2, phaseName:'Rama A · AWS', phaseColor:'ink', phaseMeta:'Costes · redirige',
    ask:'¿Quién lo lleva? ¿Tiene un dashboard claro o va un poco a ciegas? ¿Os sería útil verlo desglosado en un vistazo?',
    coach:{c:'ink',tit:'Objetivo',items:['Identificar al decisor técnico real.','Sembrar el valor de la visibilidad de costes.']},
    answers:[
      {label:'Hay interés → seguir', hint:'Prueba otro dolor', dot:'green', go:'aws_visib', crumb:'Interesado pese a no llevarlo él'},
      {label:'Hay que hablar con otra persona', hint:'Buscar al decisor', dot:'amber', go:'findDecisor', crumb:'Decisor técnico es otra persona'}
    ]
  },
  aws_visib: {
    phase:2, phaseName:'Rama A · AWS', phaseColor:'amber', phaseMeta:'Visibilidad incidencias',
    ask:'Si vuestra base de datos se llenara mañana al 95%, ¿cómo os enteraríais — por una alerta automática o porque algo deja de funcionar?',
    sub:'Pain point: visibilidad sobre incidencias.',
    listen:true,
    answers:[
      {label:'"Porque algo peta"', hint:'Admite el dolor', dot:'green', go:'aws_visib_pain', crumb:'Se entera de incidencias tarde'},
      {label:'"Tenemos alertas"', hint:'Verifica', dot:'amber', go:'aws_visib_check', crumb:'Dice tener alertas'},
      {label:'"No estoy seguro"', hint:'Siembra duda', dot:'ink', go:'aws_visib_pain', crumb:'No sabe cómo se enteraría'}
    ]
  },
  aws_visib_pain: {
    phase:2, phaseName:'Rama A · AWS', phaseColor:'green', phaseMeta:'Visibilidad · profundiza',
    ask:'¿Os ha pasado enteraros de un problema porque os llamó un cliente enfadado? Cuando ocurre, ¿cuánto tardáis en saber la causa?',
    coach:{c:'green',tit:'Lo que buscas',items:['Si el cliente avisa antes que la alerta → caso servido.','Confirmado el dolor → pasa a validar.']},
    answers:[{label:'Dolor confirmado', hint:'Sigue al cierre', dot:'green', go:'validate', crumb:'Incidencias descubiertas tarde — dolor confirmado'}]
  },
  aws_visib_check: {
    phase:2, phaseName:'Rama A · AWS', phaseColor:'amber', phaseMeta:'Visibilidad · verifica',
    ask:'¿Cuántas alertas son señal real vs ruido que ya nadie mira? ¿Tenéis un sitio único para ver la salud de todo o varias consolas?',
    coach:{c:'amber',tit:'La grieta habitual',items:['Ruido de alertas = ceguera operativa.','Varias consolas = nadie tiene la foto completa.']},
    answers:[
      {label:'Aparece la grieta', hint:'Reencuadra', dot:'green', go:'validate', crumb:'Alertas ruidosas / dispersas'},
      {label:'Lo tienen bien montado', hint:'Plantea el Agent', dot:'blue', go:'ladder', crumb:'Monitorización sólida'}
    ]
  },

  // puente escalera desde AWS al Agent
  ladder: {
    phase:2, phaseName:'Escalera', phaseColor:'blue', phaseMeta:'AWS → Agent',
    say:'Suena a que la base la tenéis bastante ordenada. Entonces te interesa más el segundo frente: que tus <b>devs pidan entornos, accesos y despliegues hablando con un agente</b>, sin abrir tickets ni esperar al equipo de plataforma. ¿Eso os pasa, que la gente se queda esperando?',
    listen:true,
    answers:[
      {label:'"Sí, se quedan esperando"', hint:'Entra en el Agent', dot:'purple', go:'agent_bottleneck', crumb:'Devs esperando — encaja el Agent'},
      {label:'"No, vamos ágiles"', hint:'Cierra suave', dot:'amber', go:'validate', crumb:'Equipo ágil'}
    ]
  },

  // ======= RAMA B · DEVOPS AGENT =======
  agent_bottleneck: {
    phase:2, phaseName:'Rama B · Agent', phaseColor:'purple', phaseMeta:'Cuello de botella',
    say:'Lo que veo en equipos que escalan es que el <b>equipo de plataforma se vuelve un cuello de botella</b>: cada entorno, acceso o despliegue es un ticket que se encola, los <b>sénior acaban de mesa de ayuda</b>, y el <b>conocimiento vive en la cabeza de una persona</b>. ¿Te suena?',
    objective:{t:'Objetivo: confirmar el dolor del modelo de tickets', c:'purple'},
    listen:true,
    answers:[
      {label:'"Sí, es justo eso"', hint:'Profundiza el cuello de botella', dot:'green', go:'agent_wait', crumb:'Reconoce el cuello de botella de tickets'},
      {label:'"Algo hay, pero lo llevamos"', hint:'Verifica autoservicio', dot:'amber', go:'agent_wait', crumb:'Cuello de botella parcial'},
      {label:'"No, eso lo tenemos resuelto"', hint:'Prueba carga del sénior', dot:'ink', go:'agent_senior', crumb:'Dice no tener cuello de botella'}
    ]
  },
  agent_wait: {
    phase:2, phaseName:'Rama B · Agent', phaseColor:'purple', phaseMeta:'Tiempos de espera',
    ask:'Cuando un dev necesita un entorno o un acceso, ¿cuántos pasos hay y cuánto tarda en tenerlo? ¿Qué pasa cuando plataforma está saturado o de vacaciones?',

// ---- STATE ----
let current = 'start';
let history = []; // {crumb, dot}

const stage = document.getElementById('stage');
const trail = document.getElementById('trail');
const rail = document.getElementById('rail');

function dotColor(name){ return ACCENT[name] ? ACCENT[name].solid : 'var(--mute)'; }

function renderRail(phase){
  rail.innerHTML = '';
  for(let i=1;i<=PHASE_TOTAL;i++){
    const seg = document.createElement('div');
    seg.className = 'seg' + (i<phase?' done':i===phase?' active':'');
    rail.appendChild(seg);
  }
}

function renderTrail(){
  trail.innerHTML = '';
  history.forEach(h=>{
    const c = document.createElement('div');
    c.className = 'crumb';
    c.innerHTML = `<span class="chip" style="background:${ACCENT[h.dot]?ACCENT[h.dot].bg:'var(--paper)'};color:${ACCENT[h.dot]?ACCENT[h.dot].fg:'var(--mute)'}">lead</span><span class="said"><b>${h.crumb}</b></span>`;
    trail.appendChild(c);
  });
}

function go(id, crumb, dot){
  if(crumb){ history.push({crumb, dot:dot||'ink'}); }
  if(id==='start'){ history=[]; }
  current = id;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function render(){
  const n = NODES[current];
  renderRail(n.phase);
  renderTrail();

  const acc = ACCENT[n.phaseColor]||ACCENT.ink;
  let html = `<div class="card"><div class="top">
    <span class="phase-no" style="background:${acc.solid}">${n.phase}</span>
    <span class="phase-name">${n.phaseName}</span>
    <span class="phase-meta">${n.phaseMeta||''}</span>
  </div><div class="body">`;

  if(n.objective){
    const oa = ACCENT[n.objective.c]||ACCENT.ink;
    html += `<div class="objective" style="color:${oa.fg}">${n.objective.t}</div>`;
  }

  if(n.say){ html += `<div class="say">${n.say}</div>`; }
  if(n.ask){ html += `<div class="prompt-q"><span class="quote">${n.ask}</span></div>`; }
  if(n.sub){ html += `<div class="sub">${n.sub}</div>`; }

  if(n.coach){
    const ca = ACCENT[n.coach.c]||ACCENT.ink;
    html += `<div class="coach" style="background:${ca.bg};color:${ca.fg}"><div class="tit">${n.coach.tit}</div><ul>`;
    n.coach.items.forEach(it=>html+=`<li>${it}</li>`);
    html += `</ul></div>`;
  }

  if(n.answers){
    html += `<div class="listen">${n.listen?'Lo que dice el lead':'Elige el camino'}</div><div class="answers">`;
    n.answers.forEach((a,i)=>{
      html += `<button class="ans" data-i="${i}">
        <span class="dot" style="background:${dotColor(a.dot)}"></span>
        <span class="txt"><span class="label">${a.label}</span><span class="hint">${a.hint}</span></span>
        <span class="arrow">→</span></button>`;
    });
    html += `</div>`;
  }

  if(n.end){
    const ea = ACCENT[n.end.c]||ACCENT.ink;
    html += `<div class="outcome-badge" style="background:${ea.bg};color:${ea.fg}">${n.end.badge}</div>`;
    html += `<div class="actions">`;
    n.end.actions.forEach((a,i)=>{
      html += `<button class="btn ${i===0?'primary':'ghost'}" data-end="${i}">${a.label}</button>`;
    });
    html += `</div>`;
  }

  html += `</div></div>`;
  stage.innerHTML = html;

  // wire answers
  stage.querySelectorAll('.ans').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const a = n.answers[+btn.dataset.i];
      go(a.go, a.crumb, a.dot);
    });
  });
  stage.querySelectorAll('[data-end]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const a = n.end.actions[+btn.dataset.end];
      go(a.go);
    });
  });
}

// ---- objections sheet ----
const sheet = document.getElementById('sheet');
const sheetBg = document.getElementById('sheetBg');
function buildObjections(){
  const body = document.getElementById('objBody');
  let h = '';
  OBJECTIONS.forEach(g=>{
    h += `<div class="obj-group-tit">${g.group}</div>`;
    g.items.forEach(o=>{
      const a = ACCENT[o.accent]||ACCENT.ink;
      h += `<div class="obj" style="border-left-color:${a.solid}">
        <div class="q">${o.q}</div>
        <div class="r">${o.r}</div>
        <div class="f"><b>Y si insisten:</b> ${o.f}</div></div>`;
    });
  });
  body.innerHTML = h;
}
function openSheet(){ sheet.classList.add('open'); sheetBg.classList.add('open'); }
function closeSheet(){ sheet.classList.remove('open'); sheetBg.classList.remove('open'); }
document.getElementById('objFab').addEventListener('click', openSheet);
sheetBg.addEventListener('click', closeSheet);

document.getElementById('resetBtn').addEventListener('click', ()=>go('start'));

buildObjections();
render();
</script>
