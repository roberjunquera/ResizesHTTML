<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resizes · Discovery Call</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap');

:root {
  --bg: #05070d;
  --panel: #0a1018;
  --card: #0e1624;
  --card2: #121d2e;
  --border: #192840;
  --border2: #1e3050;
  --cyan: #00d4ff;
  --cyan-dim: rgba(0,212,255,.12);
  --blue: #1866ff;
  --green: #00e090;
  --green-dim: rgba(0,224,144,.1);
  --red: #ff3a58;
  --red-dim: rgba(255,58,88,.1);
  --yellow: #ffc830;
  --yellow-dim: rgba(255,200,48,.1);
  --orange: #ff8020;
  --purple: #9848ff;
  --text: #cce0ff;
  --soft: #6890b8;
  --muted: #304560;
  --white: #e8f4ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: .6;
}

/* Grid */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,212,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: rgba(5,7,13,.9);
  backdrop-filter: blur(12px);
}

.logo {
  display: flex; align-items: center; gap: 12px;
}

.logo-mark {
  width: 32px; height: 32px; border-radius: 6px;
  background: var(--cyan);
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
  color: #000; letter-spacing: -1px;
  box-shadow: 0 0 20px rgba(0,212,255,.4);
}

.logo-text {
  font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  font-weight: 600; color: var(--white); letter-spacing: 1px;
}

.logo-sub {
  font-size: 11px; color: var(--soft); margin-top: 1px;
}

.header-right {
  display: flex; align-items: center; gap: 16px;
}

.step-indicator {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--soft); letter-spacing: 1px;
}

.step-indicator span { color: var(--cyan); }

.restart-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  color: var(--muted); border: 1px solid var(--border);
  background: transparent; padding: 6px 14px; border-radius: 4px;
  cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  transition: all .2s;
}
.restart-btn:hover { color: var(--red); border-color: var(--red); }

/* ── PROGRESS BAR ── */
.progress-wrap {
  position: relative; z-index: 9;
  height: 2px; background: var(--border);
}
.progress-bar {
  height: 100%; background: linear-gradient(90deg, var(--blue), var(--cyan));
  transition: width .5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px rgba(0,212,255,.5);
}

/* ── MAIN LAYOUT ── */
.main {
  position: relative; z-index: 1;
  flex: 1; display: flex;
  padding: 32px;
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

/* ── SIDEBAR: breadcrumb history ── */
.sidebar {
  width: 240px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 0;
}

.sidebar-title {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.crumb {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0;
  border-left: 2px solid var(--border);
  padding-left: 14px;
  position: relative;
}

.crumb::before {
  content: '';
  position: absolute; left: -5px; top: 14px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border2);
  border: 2px solid var(--bg);
}

.crumb.active { border-left-color: var(--cyan); }
.crumb.active::before { background: var(--cyan); box-shadow: 0 0 8px rgba(0,212,255,.6); }
.crumb.done { border-left-color: var(--border2); }
.crumb.done::before { background: var(--green); }

.crumb-step {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 2px;
}

.crumb-label {
  font-size: 11px; font-weight: 500; color: var(--soft);
  line-height: 1.3;
}

.crumb.active .crumb-label { color: var(--white); }
.crumb.active .crumb-step  { color: var(--cyan); }

.crumb-answer {
  font-size: 10px; color: var(--cyan); font-style: italic;
  margin-top: 3px; line-height: 1.3;
}

/* ── CENTER: question card ── */
.center {
  flex: 1;
  display: flex; flex-direction: column;
  gap: 20px;
}

/* ── QUESTION CARD ── */
.q-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 32px;
  position: relative;
  overflow: hidden;
  animation: slideIn .35s cubic-bezier(.4,0,.2,1);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), var(--cyan), transparent);
}

.q-meta {
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
}

.q-step-badge {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--cyan); background: var(--cyan-dim);
  border: 1px solid rgba(0,212,255,.2);
  padding: 3px 10px; border-radius: 3px; letter-spacing: 1.5px;
  text-transform: uppercase;
}

.q-category {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
}

.q-script-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--blue); letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 8px; display: block;
}

.q-text {
  font-size: 22px; font-weight: 600; color: var(--white);
  line-height: 1.4; margin-bottom: 16px;
  letter-spacing: -0.3px;
}

.q-hint {
  font-size: 13px; font-weight: 300; color: var(--soft);
  font-style: italic; line-height: 1.6;
  padding: 12px 16px;
  background: rgba(255,255,255,.02);
  border: 1px solid var(--border);
  border-radius: 6px;
}

.q-hint strong {
  color: var(--text); font-weight: 500; font-style: normal;
}

/* ── ANSWERS ── */
.answers {
  display: flex; flex-direction: column; gap: 10px;
}

.answer-btn {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  text-align: left;
  width: 100%;
  animation: fadeUp .3s ease both;
  position: relative; overflow: hidden;
}

.answer-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  opacity: 0; transition: opacity .2s;
}

.answer-btn:hover {
  border-color: var(--blue);
  transform: translateX(4px);
  box-shadow: -4px 0 0 var(--blue), 0 4px 20px rgba(24,102,255,.15);
}

.answer-btn:hover::before { opacity: .04; }

.answer-btn:nth-child(1){ animation-delay: .05s; }
.answer-btn:nth-child(2){ animation-delay: .10s; }
.answer-btn:nth-child(3){ animation-delay: .15s; }
.answer-btn:nth-child(4){ animation-delay: .20s; }
.answer-btn:nth-child(5){ animation-delay: .25s; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.answer-icon {
  width: 36px; height: 36px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  background: var(--border); position: relative; z-index: 1;
}

.answer-content { position: relative; z-index: 1; flex: 1; }

.answer-main {
  font-size: 14px; font-weight: 600; color: var(--white);
  line-height: 1.3; margin-bottom: 2px;
}

.answer-sub {
  font-size: 11px; font-weight: 300; color: var(--soft);
  font-style: italic;
}

.answer-arrow {
  font-size: 16px; color: var(--muted);
  position: relative; z-index: 1;
  transition: transform .2s, color .2s;
}
.answer-btn:hover .answer-arrow { transform: translateX(4px); color: var(--cyan); }

/* Color variants */
.answer-btn.green:hover  { border-color: var(--green);  box-shadow: -4px 0 0 var(--green),  0 4px 20px rgba(0,224,144,.1); }
.answer-btn.red:hover    { border-color: var(--red);    box-shadow: -4px 0 0 var(--red),    0 4px 20px rgba(255,58,88,.1); }
.answer-btn.yellow:hover { border-color: var(--yellow); box-shadow: -4px 0 0 var(--yellow), 0 4px 20px rgba(255,200,48,.1); }
.answer-btn.orange:hover { border-color: var(--orange); box-shadow: -4px 0 0 var(--orange), 0 4px 20px rgba(255,128,32,.1); }
.answer-btn.purple:hover { border-color: var(--purple); box-shadow: -4px 0 0 var(--purple), 0 4px 20px rgba(152,72,255,.1); }
.answer-btn.cyan:hover   { border-color: var(--cyan);   box-shadow: -4px 0 0 var(--cyan),   0 4px 20px rgba(0,212,255,.1); }

/* ── OUTCOME CARD ── */
.outcome-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 32px;
  animation: slideIn .4s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
}

.outcome-card.cost     { border-color: rgba(255,200,48,.3);  }
.outcome-card.cost::before     { background: linear-gradient(90deg, transparent, var(--yellow), transparent); }
.outcome-card.obs      { border-color: rgba(152,72,255,.3);  }
.outcome-card.obs::before      { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
.outcome-card.dev      { border-color: rgba(0,212,255,.3);   }
.outcome-card.dev::before      { background: linear-gradient(90deg, transparent, var(--cyan),   transparent); }
.outcome-card.services { border-color: rgba(255,128,32,.3);  }
.outcome-card.services::before { background: linear-gradient(90deg, transparent, var(--orange), transparent); }
.outcome-card.migration{ border-color: rgba(0,224,144,.3);   }
.outcome-card.migration::before{ background: linear-gradient(90deg, transparent, var(--green),  transparent); }
.outcome-card.discard  { border-color: rgba(255,58,88,.3);   }
.outcome-card.discard::before  { background: linear-gradient(90deg, transparent, var(--red),    transparent); }

.outcome-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
}

.outcome-badge {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px;
  border-radius: 4px; display: inline-block; margin-bottom: 16px;
}

.outcome-title {
  font-size: 28px; font-weight: 700; margin-bottom: 8px;
  letter-spacing: -0.5px; line-height: 1.2;
}

.outcome-desc {
  font-size: 14px; font-weight: 300; color: var(--soft);
  line-height: 1.6; margin-bottom: 24px;
}

.outcome-items {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
}

.outcome-item {
  font-size: 12px; font-weight: 500;
  padding: 6px 14px; border-radius: 5px;
  font-family: 'IBM Plex Mono', monospace; letter-spacing: .5px;
}

.outcome-script {
  background: rgba(255,255,255,.03); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 20px;
}

.outcome-script-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--cyan); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 8px; display: block;
}

.outcome-script-text {
  font-size: 14px; font-style: italic; color: var(--text);
  line-height: 1.6; font-weight: 300;
}

.outcome-actions {
  display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;
}

.btn-primary {
  background: var(--blue); color: #fff;
  border: none; padding: 12px 24px; border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 8px;
}
.btn-primary:hover { background: var(--cyan); color: #000; transform: translateY(-1px); }

.btn-secondary {
  background: transparent; color: var(--soft);
  border: 1px solid var(--border); padding: 12px 24px; border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.btn-secondary:hover { border-color: var(--border2); color: var(--text); }

/* ── ICP GAUGE (right panel) ── */
.right-panel {
  width: 200px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 16px;
}

.panel-title {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 4px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.signal-item {
  display: flex; flex-direction: column; gap: 4px;
}

.signal-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--soft);
}

.signal-label span:last-child {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
}

.signal-bar-wrap {
  height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
}

.signal-bar {
  height: 100%; border-radius: 2px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

.pain-tags {
  display: flex; flex-direction: column; gap: 6px; margin-top: 4px;
}

.pain-tag {
  font-size: 10px; padding: 5px 10px; border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace; letter-spacing: .5px;
  opacity: .3; transition: opacity .4s;
  border: 1px solid transparent;
}

.pain-tag.active { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">R/</div>
    <div>
      <div class="logo-text">RESIZES</div>
      <div class="logo-sub">Discovery Call Assistant</div>
    </div>
  </div>
  <div class="header-right">
    <div class="step-indicator">Paso <span id="stepNum">1</span> de 9</div>
    <button class="restart-btn" onclick="restart()">↺ Reiniciar</button>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:11%"></div>
</div>

<div class="main">

  <!-- SIDEBAR: history -->
  <div class="sidebar">
    <div class="sidebar-title">Historial de llamada</div>
    <div id="crumbList"></div>
  </div>

  <!-- CENTER: question -->
  <div class="center" id="center"></div>

  <!-- RIGHT: signals -->
  <div class="right-panel">
    <div>
      <div class="panel-title">Señales detectadas</div>
      <div class="pain-tags">
        <div class="pain-tag" id="sig-cost" style="background:rgba(255,200,48,.08);border-color:rgba(255,200,48,.2);color:var(--yellow);">💸 Cost Pain</div>
        <div class="pain-tag" id="sig-obs"  style="background:rgba(152,72,255,.08);border-color:rgba(152,72,255,.2);color:var(--purple);">🚨 Observability Pain</div>
        <div class="pain-tag" id="sig-dev"  style="background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.2);color:var(--cyan);">🚀 Developer Pain</div>
        <div class="pain-tag" id="sig-aws"  style="background:rgba(0,224,144,.08);border-color:rgba(0,224,144,.2);color:var(--green);">☁️ En AWS</div>
        <div class="pain-tag" id="sig-icp"  style="background:rgba(24,102,255,.08);border-color:rgba(24,102,255,.2);color:#7aadff;">✅ ICP Fit</div>
        <div class="pain-tag" id="sig-nodev" style="background:rgba(255,128,32,.08);border-color:rgba(255,128,32,.2);color:var(--orange);">🌱 Sin equipo dev</div>
      </div>
    </div>

    <div>
      <div class="panel-title">Encaje ICP</div>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="signal-item">
          <div class="signal-label"><span>Stack técnico</span><span id="v-stack">—</span></div>
          <div class="signal-bar-wrap"><div class="signal-bar" id="b-stack" style="width:0%;background:var(--muted);"></div></div>
        </div>
        <div class="signal-item">
          <div class="signal-label"><span>Cloud</span><span id="v-cloud">—</span></div>
          <div class="signal-bar-wrap"><div class="signal-bar" id="b-cloud" style="width:0%;background:var(--muted);"></div></div>
        </div>
        <div class="signal-item">
          <div class="signal-label"><span>Deploy</span><span id="v-deploy">—</span></div>
          <div class="signal-bar-wrap"><div class="signal-bar" id="b-deploy" style="width:0%;background:var(--muted);"></div></div>
        </div>
        <div class="signal-item">
          <div class="signal-label"><span>Urgencia</span><span id="v-urgency">—</span></div>
          <div class="signal-bar-wrap"><div class="signal-bar" id="b-urgency" style="width:0%;background:var(--muted);"></div></div>
        </div>
      </div>
    </div>

    <div style="margin-top:8px;">
      <div class="panel-title">Notas de llamada</div>
      <textarea id="notes" placeholder="Escribe aquí lo que te cuente el cliente..." style="
        width:100%; min-height:120px; background:var(--card); border:1px solid var(--border);
        border-radius:6px; padding:10px; color:var(--text); font-family:'DM Sans',sans-serif;
        font-size:11px; resize:vertical; outline:none; line-height:1.5;
      "></textarea>
    </div>
  </div>

</div>

<script>
// ── STATE ──
const state = {
  currentStep: 'apertura',
  history: [],
  signals: { cost: false, obs: false, dev: false, aws: false, icp: false, nodev: false },
  icp: { stack: 0, cloud: 0, deploy: 0, urgency: 0 },
  stepNum: 1,
};

// ── FLOW DEFINITION ──
const flow = {

  apertura: {
    step: '00', category: 'Apertura',
    label: 'Permiso para hablar',
    script: '¿Te robo 30 segundos y me dices si tiene sentido seguir?',
    hint: 'Directo y sin rodeos. <strong>No vendas nada todavía.</strong> Si no tienen tiempo, pide un momento mejor. Nunca argumentes en este punto.',
    answers: [
      { id: 'apertura-si',  icon: '✅', main: 'Sí, adelante', sub: 'Tienen tiempo ahora', color: 'green', next: 'contexto' },
      { id: 'apertura-no',  icon: '📅', main: 'No tengo tiempo ahora', sub: 'Pide un mejor momento', color: 'red', next: 'exit-tiempo' },
    ]
  },

  'exit-tiempo': {
    step: '—', category: 'Salida',
    label: 'Sin tiempo',
    script: 'Sin problema, ¿cuándo sería un buen momento para hablar 5 minutos?',
    hint: 'Agenda otro momento. No insistas ni vendas. El objetivo es solo conseguir la llamada.',
    answers: [
      { id: 'exit-agenda', icon: '📆', main: 'Agenda otro momento', sub: 'Fin del flujo de hoy', color: '', next: null, outcome: 'exit' },
    ]
  },

  contexto: {
    step: '01', category: 'Contexto del equipo',
    label: 'Equipo técnico',
    script: '¿Quién se encarga hoy de la infraestructura en vuestro equipo y cuánto tiempo os consume eso a la semana?',
    hint: '<strong>No preguntes si tienen devs.</strong> Deja que te lo cuenten. El "cuánto tiempo" revela la carga operativa real.',
    answers: [
      { id: 'ctx-interno',  icon: '👨‍💻', main: 'Equipo técnico interno', sub: 'DevOps propio o developers con infra', color: 'green', next: 'icp-stack',
        signals: { icp: true }, icp: {} },
      { id: 'ctx-externo',  icon: '🏢', main: 'Agencia o partner externo', sub: 'Dependencia externa', color: 'yellow', next: 'icp-stack',
        signals: {}, icp: {} },
      { id: 'ctx-nadie',   icon: '🌱', main: 'Nadie / no hay equipo técnico', sub: 'Sin capacidad técnica interna', color: 'orange', next: 'services-tipo',
        signals: { nodev: true }, icp: {} },
    ]
  },

  'icp-stack': {
    step: '02a', category: 'ICP Check · Stack',

// ── RENDER ──
function render(stepId) {
  const step = flow[stepId];
  if (!step) return;
  state.currentStep = stepId;

  // Progress
  const stepOrder = ['apertura','contexto','icp-stack','icp-cloud','icp-deploy','infra-guerra','costes-control','pain-profundidad','pregunta-clave','historia','cierre'];
  const idx = stepOrder.indexOf(stepId);
  const pct = idx < 0 ? 90 : Math.round(((idx + 1) / stepOrder.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('stepNum').textContent = step.step;

  // Center
  const center = document.getElementById('center');
  center.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-step-badge">paso ${step.step}</span>
        <span class="q-category">${step.category}</span>
      </div>
      <span class="q-script-label">// di esto</span>
      <div class="q-text">"${step.script}"</div>
      <div class="q-hint">${step.hint}</div>
    </div>
    <div class="answers" id="answers"></div>
  `;

  const answersEl = document.getElementById('answers');
  step.answers.forEach(ans => {
    const btn = document.createElement('button');
    btn.className = `answer-btn ${ans.color}`;
    btn.innerHTML = `
      <div class="answer-icon">${ans.icon}</div>
      <div class="answer-content">
        <div class="answer-main">${ans.main}</div>
        ${ans.sub ? `<div class="answer-sub">${ans.sub}</div>` : ''}
      </div>
      <div class="answer-arrow">→</div>
    `;
    btn.onclick = () => selectAnswer(stepId, ans);
    answersEl.appendChild(btn);
  });

  updateCrumbs(stepId, step);
}

function selectAnswer(stepId, ans) {
  const step = flow[stepId];

  // Record history
  state.history.push({ stepId, step, answer: ans });

  // Apply signals
  if (ans.signals) Object.keys(ans.signals).forEach(k => { if (ans.signals[k]) state.signals[k] = true; });

  // Apply ICP scores
  if (ans.icp) Object.keys(ans.icp).forEach(k => { if (ans.icp[k] !== undefined) state.icp[k] = ans.icp[k]; });

  updateSignals();
  updateICP();
  updateCrumbs(stepId, step, ans);

  // Navigate
  if (ans.outcome) {
    showOutcome(ans.outcome);
  } else if (ans.next) {
    render(ans.next);
  } else if (ans.outcome_hint) {
    showSmartOutcome();
  } else {
    showSmartOutcome();
  }
}

function showOutcome(outcomeId) {
  let data = outcomeId === 'demo' ? getPainOutcome(state.signals) : outcomes[outcomeId];
  if (!data) data = outcomes[outcomeId] || outcomes.demo;
  renderOutcome(data);
}

function showSmartOutcome() {
  renderOutcome(getPainOutcome(state.signals));
}

      </div>
      <div class="outcome-actions">
        <button class="btn-primary" onclick="restart()">↺ Nueva llamada</button>
        <button class="btn-secondary" onclick="window.print()">🖨 Imprimir resumen</button>
      </div>
    </div>
  `;
}

function updateSignals() {
  Object.keys(state.signals).forEach(k => {
    const el = document.getElementById('sig-' + k);
    if (el) el.classList.toggle('active', state.signals[k]);
  });
}

function updateICP() {
  const map = { stack: 'stack', cloud: 'cloud', deploy: 'deploy', urgency: 'urgency' };
  Object.keys(map).forEach(k => {
    const val = state.icp[k] || 0;
    const bar = document.getElementById('b-' + map[k]);
    const valEl = document.getElementById('v-' + map[k]);
    if (bar) {
      bar.style.width = val + '%';
      bar.style.background = val >= 70 ? 'var(--green)' : val >= 40 ? 'var(--yellow)' : val > 0 ? 'var(--red)' : 'var(--muted)';
    }
    if (valEl) valEl.textContent = val > 0 ? (val >= 70 ? '↑ alto' : val >= 40 ? '~ medio' : '↓ bajo') : '—';
  });
}

function updateCrumbs(currentId, currentStep, selectedAns) {
  const crumbList = document.getElementById('crumbList');
  crumbList.innerHTML = '';

  state.history.forEach(h => {
    const div = document.createElement('div');
    div.className = 'crumb done';
    div.innerHTML = `
      <div>
        <div class="crumb-step">${h.step.step}</div>
        <div class="crumb-label">${h.step.label}</div>
        <div class="crumb-answer">"${h.answer.main}"</div>
      </div>
    `;
    crumbList.appendChild(div);
  });

  const active = document.createElement('div');
  active.className = 'crumb active';
  active.innerHTML = `
    <div>
      <div class="crumb-step">${currentStep.step}</div>
      <div class="crumb-label">${currentStep.label}</div>
    </div>
  `;
  crumbList.appendChild(active);
}

function restart() {
  state.currentStep = 'apertura';
  state.history = [];
  state.signals = { cost: false, obs: false, dev: false, aws: false, icp: false, nodev: false };
  state.icp = { stack: 0, cloud: 0, deploy: 0, urgency: 0 };
  state.stepNum = 1;
  updateSignals();
  updateICP();
  document.getElementById('crumbList').innerHTML = '';
  document.getElementById('notes').value = '';
  render('apertura');
}

// ── INIT ──
render('apertura');
</script>
</body>
</html>
